# Publishes this n8n community node package to npm on every version tag push.
#
# Starting May 1 2026, n8n requires community nodes to be published via GitHub
# Actions with npm provenance statements. `n8n-node release` (run below) handles
# lint, build, and `npm publish` with provenance when it detects CI.
#
# ─── ONE-TIME SETUP ────────────────────────────────────────────────────────────
#
# Option A — OIDC Trusted Publishing (recommended, no long-lived secrets):
#   1. On npmjs.com, open this package's settings.
#   2. "Publish access" → "Trusted Publishers" → "Add a publisher".
#   3. Select GitHub Actions and fill in:
#        Repository owner: <your-github-username-or-org>
#        Repository name:  <your-repo-name>
#        Workflow name:    publish.yml
#        Environment:      (leave blank unless you use GitHub Environments)
#   4. Leave the NPM_TOKEN secret unset — GitHub's OIDC token is used instead.
#
# Option B — npm Automation Token (fallback):
#   1. npmjs.com → Access Tokens → Generate a Granular Access Token scoped to
#      this package with "Read and write" publish permission.
#   2. GitHub → Settings → Secrets and variables → Actions → add NPM_TOKEN.
#
# ─── RELEASE PROCESS ───────────────────────────────────────────────────────────
#
# Run locally to cut a release (bumps version, commits, tags, and pushes):
#
#   npm run release
#
# Pushing the tag triggers this workflow, which publishes to npm.

name: Publish

on:
  push:
    tags:
      # Matches 0.1.0, 1.2.3, 2.0.0-rc.1, etc. Use ['v*.*.*'] for a "v" prefix.
      - '*.*.*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      # Required to mint an OIDC token for npm provenance attestation.
      id-token: write
      # Scoped down from the default (write) for least-privilege publishing.
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Release
        # In CI, `n8n-node release` runs lint + build, then `npm publish` with
        # provenance. Option A (OIDC): leave NPM_TOKEN unset. Option B (token):
        # set NPM_TOKEN in repo secrets — it is written to .npmrc here first.
        run: |
          [ -n "$NPM_TOKEN" ] && npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"
          npm run release
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
